# ============================================================================
# MODULAR CONFIGURATION
# ============================================================================

source-file ~/.config/tmux/settings.conf
source-file ~/.config/tmux/keybindings.conf
source-file ~/.config/tmux/appearance.conf

# ============================================================================
# USER-SPECIFIC OVERRIDES
# ============================================================================

# Load local overrides if present (not tracked in version control)
if-shell '[ -f ~/.tmux.conf.local ]' 'source-file ~/.tmux.conf.local'

